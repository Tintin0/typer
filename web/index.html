<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>typr · local autocomplete for macOS</title>
<meta name="description" content="Local, on-device autocomplete for macOS. A faint suggestion at your caret, in almost any app. Runs on your Mac. No cloud, no account." />
<meta property="og:title" content="typr" />
<meta property="og:description" content="Local autocomplete for macOS. On your Mac, nowhere else." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://typr.frgmt.xyz" />
<meta name="theme-color" content="#0b0b0d" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<style>
  :root {
    --bg: #0b0b0d;
    --fg: #e7e7ea;
    --dim: #8a8a92;
    --ghost: #55555e;
    --accent: #6ea8ff;
    --green: #5fd081;
    --red: #ff7a7a;
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", "Fira Code", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  /* the view follows the caret on its own (see follow() in home.ts), so the reader
     never has to scroll during the writing; afterwards the page scrolls normally. */
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font-family: var(--mono); font-size: 15px; line-height: 1.75;
    -webkit-font-smoothing: antialiased;
    padding: 11vh 1.4rem 22vh;
  }
  #doc { max-width: 74ch; margin: 0 auto; }
  .blk { margin: 0; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; text-underline-offset: 3px; }

  .brand { color: var(--dim); margin-bottom: 2.2rem; }
  .brand .pulse { color: var(--accent); }
  h1.h1 { font-size: 1.55rem; font-weight: 700; line-height: 1.3; letter-spacing: -0.01em; margin: 0 0 1.6rem; }
  p.p { color: var(--dim); margin: 0 0 1.7rem; }
  .h2 { color: var(--accent); margin: 2.2rem 0 0.4rem; }
  pre.code { margin: 0 0 1.7rem; white-space: pre-wrap; word-break: break-word; color: var(--fg); }
  pre.list { margin: 0 0 1.7rem; white-space: pre; overflow-x: auto; color: var(--dim); }
  pre.list b { color: var(--fg); font-weight: 400; }
  pre.code .pr { color: var(--dim); }
  .cap { color: var(--dim); margin: 0.7rem 0 1.7rem; }
  .foot { color: var(--dim); margin-top: 2rem; }
  .foot a { color: var(--dim); }
  .foot a:hover { color: var(--fg); }

  /* committed vs ghost text */
  .done { color: inherit; }
  .ghost { color: var(--ghost); }
  pre.code .ghost { color: #5c7a52; }

  /* caret */
  #caret { display: inline-block; width: 2px; height: 1.05em; background: var(--accent); vertical-align: -0.16em; margin: 0 1px; animation: blink 1.05s steps(1) infinite; }
  #caret.hide { display: none; }
  @keyframes blink { 50% { opacity: 0; } }

  /* typo correction */
  .wp { border-radius: 2px; }
  .wp.bad { color: var(--red); text-decoration: line-through; text-decoration-color: var(--red); }
  .wp.fixed { color: var(--green); }
  .fixpop {
    position: fixed; z-index: 30; transform: translate(-50%, -100%);
    color: var(--green); background: var(--bg); border: 1px solid var(--green);
    border-radius: 6px; padding: 0.05rem 0.5ch; font-size: 13px; white-space: nowrap;
    pointer-events: none; opacity: 0; transition: opacity 0.16s;
  }
  .fixpop.show { opacity: 1; }

  /* selection + move */
  .sel { background: rgba(110,168,255,0.18); border-radius: 2px; }
  .lift { transition: transform 0.3s ease, opacity 0.3s; transform: translateY(-9px); opacity: 0; }
  .drop { animation: drop 0.36s ease; }
  @keyframes drop { from { opacity: 0; } to { opacity: 1; } }

  /* the demo video, dragged into place */
  figure.demo { margin: 0.6rem 0 0.2rem; }
  figure.demo video { display: block; width: 100%; max-width: 560px; border: 1px solid #23232b; border-radius: 8px; background: #000; }
  figure.demo.fly { transition: transform 0.5s cubic-bezier(.4,0,.2,1), opacity 0.4s; will-change: transform; }
  figure.demo.grab video { box-shadow: 0 24px 60px -20px rgba(0,0,0,0.8); outline: 1px solid var(--accent); }

  /* key hint chip — sits BELOW the caret so it never covers incoming ghost text */
  #chip { position: fixed; z-index: 30; display: flex; gap: 0.45rem; pointer-events: none; opacity: 0; transition: opacity 0.18s; }
  #chip.show { opacity: 1; }
  .key { color: var(--dim); font-size: 12px; }
  .key kbd { font-family: inherit; color: var(--fg); border: 1px solid #2a2a32; border-bottom-width: 2px; border-radius: 4px; padding: 0 0.4ch; }
  .key.fire, .key.fire kbd { color: var(--green); border-color: var(--green); }

  /* controls */
  .controls { position: fixed; bottom: 1rem; left: 0; right: 0; display: flex; justify-content: center; gap: 0.5rem; z-index: 40; }
  .controls button {
    font-family: var(--mono); font-size: 12px; cursor: pointer; color: var(--dim);
    background: rgba(11,11,13,0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid #23232b; border-radius: 999px; padding: 0.3rem 0.85rem;
  }
  .controls button:hover { color: var(--fg); border-color: var(--accent); }
  .controls button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  #replay[hidden] { display: none; }

  @media (prefers-reduced-motion: reduce) {
    #caret { animation: none; }
    figure.demo.fly, .lift, .drop, .fixpop, #chip { transition: none; animation: none; }
  }
</style>
</head>
<body>
<!--
  SPA fallback for nested research routes. In production Cloudflare has no static file
  for /research/<slug>, so it serves this index.html. We detect that prefix before the
  page paints and hand off to research.html (which CF DOES serve, at /research).
-->
<script>
  (function () {
    var m = location.pathname.match(/^\/research\/([^/?#]+)\/?$/);
    if (m) location.replace("/research?p=" + encodeURIComponent(m[1]));
  })();
</script>

<div id="doc" aria-label="typr, written by typr"></div>

<div id="chip" aria-hidden="true">
  <span class="key" id="key-tab"><kbd>tab</kbd> word</span>
  <span class="key" id="key-all"><kbd>`</kbd> all</span>
</div>
<div class="fixpop" id="fixpop" aria-hidden="true"></div>

<div class="controls">
  <button id="skip">skip ›</button>
  <button id="replay" hidden>replay ↻</button>
</div>

<script type="module" src="/src/home.ts"></script>
</body>
</html>
