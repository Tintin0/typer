# Typer configuration. Copied to ~/Library/Application Support/typer/config.toml
# by install.sh. Edit that copy, then restart Typer to apply.

enabled = true
completion_enabled = true
typo_correction_enabled = false   # off by default — focus is on autocomplete

# Leave empty to auto-pick the first .gguf in the Models directory.
model_path = ""

max_completion_words = 7      # length of each suggestion chunk
min_context_chars = 6         # don't suggest until this much has been typed
debounce_ms = 110             # pause-before-generating; should exceed your between-key
                              # gap so we generate once per PAUSE, not once per key
                              # (too low = a model run on nearly every keystroke = battery drain)
idle_reset_seconds = 20       # clear the buffer after this long with no typing
# (sampling — temperature/top-k/min-p — is tuned in scripts/llama_server.cpp)

# Energy. The model runs on the GPU, so fewer/longer-debounced runs = less battery.
prefetch_enabled = true       # speculatively fetch the next chunk (snappier, ~2× inference)
battery_saver = true          # on battery / Low Power Mode: longer debounce + no prefetch
battery_debounce_ms = 300     # debounce used while battery-saving

# Broader-context sources (all on-device). Set any to false to disable.
window_context_enabled = true     # read surrounding text via Accessibility
style_memory_enabled = true       # learn from your own recent writing (local only)
clipboard_context_enabled = true  # include recently copied text
screen_context_enabled = false    # screenshot OCR as prompt context — off by default (noisy)
# Caret placement in apps with NO Accessibility caret (terminals, custom editors) via
# screenshot + Vision OCR. OFF by default: it runs on the Neural Engine and is very
# battery-heavy if it fires repeatedly. Native + Electron/WebKit apps don't need it.
screenshot_caret_enabled = false
# Ambient "topic memory": every few minutes, OCR the focused window, distill the
# salient names/topics (NOT the raw text), and resurface a short note later — only
# when you start typing about one of those entities (e.g. tell a friend about a
# product you were just reading about). On-device; needs Screen Recording. Off by
# default. topic_capture_seconds is the capture period (min 60).
topic_memory_enabled = false
topic_capture_seconds = 180
background_refresh_seconds = 4.0   # how often the background context is refreshed

# Diagnostics. When false (default) the log never records typed text / snippets.
# Typer always skips capture entirely while macOS secure input is active
# (password fields, login window, sudo prompts), regardless of this setting.
debug_logging = false

# Where Typer stays silent. Use the menu (Disable in <app> / Skip terminal apps)
# or set here. disabled_apps is a comma-separated list of bundle IDs.
disable_in_terminals = false
disabled_apps = ""
# Note: caret placement still uses a screenshot fallback (with Screen Recording)
# only when Accessibility/text-marker caret is unavailable; that is separate from
# screen_context_enabled above.
