<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>typer · announcements</title>
<meta name="description" content="What's new in typer, local on-device autocomplete for macOS. Written for humans; the changelog has the engineering." />
<meta property="og:title" content="typer · announcements" />
<meta property="og:description" content="What's new in typer, written for humans." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://typr.frgmt.xyz/announcements" />
<meta name="theme-color" content="#fafaf8" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/space-grotesk-var.woff2" />
<link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/dm-sans-var.woff2" />
<!-- early theme: set data-theme before paint to avoid a flash. Mirrors initThemeEarly(). -->
<script>
  (function () {
    try {
      var t = localStorage.getItem("typer-theme");
      if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  })();
</script>
</head>
<body>
<header id="nav"></header>

<main id="page">
  <section class="section">
    <div class="container">
      <h1 style="font-size: var(--t-h2); margin-bottom: var(--sp-5);">announcements</h1>
      <p class="lead" style="max-width: 58ch;">
        what's new in typer, written for humans. the engineering lives in the
        <a href="https://github.com/frgmt0/typer/blob/main/CHANGELOG.md" target="_blank" rel="noopener">changelog</a>;
        this is what it feels like to use.
      </p>
    </div>
  </section>

  <section class="section" style="padding-top: 0;">
    <div class="container">
      <div id="feed" aria-label="announcements">
        <noscript><p class="empty">this feed needs JavaScript, or just read <a href="https://github.com/frgmt0/typer/blob/main/ANNOUNCEMENTS.md" target="_blank" rel="noopener">ANNOUNCEMENTS.md</a> on GitHub.</p></noscript>
      </div>
    </div>
  </section>
</main>

<footer id="footer"></footer>

<script type="module" src="/src/announcements.ts"></script>
</body>
</html>
