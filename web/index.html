<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>typer · local autocomplete for macOS</title>
<meta name="description" content="Local, on-device autocomplete for macOS. A faint suggestion appears at your caret in almost any app — on your Mac and nowhere else. Runs on llama.cpp + a GGUF model. No cloud, no account. MIT." />
<meta name="keywords" content="local autocomplete macos, on-device text prediction mac, open source autocomplete, private autocomplete, cotypist alternative" />
<meta property="og:title" content="typer · autocomplete that never leaves your Mac" />
<meta property="og:description" content="Local, on-device autocomplete for macOS. On your Mac, nowhere else. Open source, runs on llama.cpp." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://typr.frgmt.xyz" />
<meta name="theme-color" content="#fafaf8" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/space-grotesk-var.woff2" />
<link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/dm-sans-var.woff2" />
<!-- early theme: set data-theme before paint to avoid a flash. Mirrors initThemeEarly(). -->
<script>
  (function () {
    try {
      var t = localStorage.getItem("typer-theme");
      if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  })();
</script>
</head>
<body>
<header id="nav"></header>

<main id="home">
  <!-- Home content is rendered by src/home.ts (next wave). Placeholder hero below
       so the foundation build is a complete, navigable page. -->
  <section class="section">
    <div class="container">
      <p class="eyebrow">local · on-device · macOS</p>
      <h1 style="font-size: var(--t-hero); max-width: 16ch; margin-bottom: var(--sp-5);">
        you type the first half, it shows you the rest.
      </h1>
      <p class="lead" style="max-width: 52ch; margin-bottom: var(--sp-6);">
        autocomplete that never leaves your Mac. a dim suggestion appears at your caret in almost
        any app, on your Mac and nowhere else.
      </p>
      <div style="display: flex; gap: var(--sp-4); flex-wrap: wrap;">
        <a class="btn btn--primary" href="#install">install</a>
        <a class="btn btn--blue" href="https://github.com/frgmt0/typer" target="_blank" rel="noopener">view source</a>
      </div>
    </div>
  </section>
</main>

<footer id="footer"></footer>

<script type="module" src="/src/home.ts"></script>
</body>
</html>
