<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>typr · local autocomplete for macOS</title>
<meta name="description" content="Local, on-device autocomplete for macOS. A faint suggestion at your caret, in almost any app. Runs on your Mac. No cloud, no account." />
<meta property="og:title" content="typr" />
<meta property="og:description" content="Local autocomplete for macOS. On your Mac, nowhere else." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://typr.frgmt.xyz" />
<meta name="theme-color" content="#08080b" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<style>
  :root {
    --bg: #08080b;
    --fg: #f2f2f5;
    --dim: #9a9aa4;
    --mut: #6e6e78;
    --ghost: #595962;
    --rule: #1c1c23;
    --rule-2: #26262f;
    --caret: #5b8def;
    --caret-soft: rgba(91, 141, 239, 0.18);
    --green: #46d36b;
    --green-soft: rgba(70, 211, 107, 0.16);
    --red: #ff6b6b;
    --red-soft: rgba(255, 107, 107, 0.14);
    --surface: #111116;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Helvetica Neue", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: var(--sans); font-size: 17px; line-height: 1.65;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    height: 100vh; overflow: hidden;            /* locked viewport */
    display: flex; flex-direction: column;
  }
  /* faint dotted field + soft glow */
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -2; pointer-events: none;
    background-image: radial-gradient(circle at center, rgba(255,255,255,0.022) 1px, transparent 1px);
    background-size: 26px 26px;
    mask-image: radial-gradient(ellipse 80% 70% at 50% 42%, #000 35%, transparent 100%);
    -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 42%, #000 35%, transparent 100%);
  }
  body::after {
    content: ""; position: fixed; top: -16vh; left: 50%; transform: translateX(-50%);
    width: 1000px; height: 640px; max-width: 120vw; z-index: -1; pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(91,141,239,0.10), transparent 62%);
  }

  /* ---------- stage ---------- */
  main {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 4.5rem 1.5rem 2rem; min-height: 0;
  }
  #doc { width: 100%; max-width: 660px; }
  .blk { margin: 0; }
  .brand { font-family: var(--mono); font-size: 15px; letter-spacing: -0.01em; color: var(--dim); margin-bottom: 1.7rem; }
  .brand .pulse { color: var(--caret); }
  h1.h1 { font-weight: 660; letter-spacing: -0.03em; line-height: 1.1; font-size: clamp(2rem, 6.4vw, 3.5rem); margin: 0 0 1.4rem; }
  p.p { color: var(--dim); font-size: clamp(1rem, 2.5vw, 1.2rem); line-height: 1.62; margin: 0 0 1.8rem; max-width: 600px; }
  pre.code {
    font-family: var(--mono); font-size: clamp(12px, 2.6vw, 14px); color: #b9ebab;
    background: var(--surface); border: 1px solid var(--rule-2); border-radius: 10px;
    padding: 0.85rem 1rem; margin: 0 0 1.8rem; white-space: pre-wrap; word-break: break-word; line-height: 1.5;
  }
  pre.code .pr { color: var(--mut); }
  .foot { font-family: var(--mono); font-size: 13px; color: var(--mut); }

  /* committed vs ghost text */
  .done { color: inherit; }
  .ghost { color: var(--ghost); }
  pre.code .ghost { color: #5f7a57; }

  /* the caret */
  #caret {
    display: inline-block; width: 2px; height: 1.04em; background: var(--caret);
    vertical-align: -0.15em; margin: 0 1px; border-radius: 1px;
    box-shadow: 0 0 9px var(--caret); animation: blink 1.05s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* typo: word being corrected */
  .wp { position: relative; border-radius: 3px; transition: color 0.2s, background 0.2s; }
  .wp.bad { color: var(--red); text-decoration: line-through; text-decoration-color: var(--red); text-decoration-thickness: 2px; background: var(--red-soft); }
  .wp.fixed { color: var(--green); background: var(--green-soft); }
  /* green suggestion popover above a typo */
  .fixpop {
    position: fixed; z-index: 30; transform: translate(-50%, -100%);
    font-family: var(--mono); font-size: 12.5px; color: var(--green);
    background: #0d160f; border: 1px solid var(--green-soft); border-radius: 8px;
    padding: 0.28rem 0.6rem 0.3rem; white-space: nowrap; pointer-events: none;
    box-shadow: 0 8px 24px -10px rgba(0,0,0,0.7); opacity: 0; transition: opacity 0.18s, transform 0.18s;
  }
  .fixpop.show { opacity: 1; }
  .fixpop .chk { color: var(--green); margin-right: 0.5ch; }
  .fixpop::after { content: ""; position: absolute; left: 50%; bottom: -5px; width: 8px; height: 8px; background: #0d160f; border-right: 1px solid var(--green-soft); border-bottom: 1px solid var(--green-soft); transform: translateX(-50%) rotate(45deg); }

  /* selection + move */
  .sel { background: var(--caret-soft); border-radius: 3px; box-shadow: 0 0 0 2px var(--caret-soft); }
  .lift { transition: transform 0.32s cubic-bezier(.4,0,.2,1), opacity 0.32s; transform: translateY(-10px); opacity: 0; }
  .drop { animation: drop 0.4s cubic-bezier(.2,.7,.2,1); }
  @keyframes drop { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }

  /* key hint chip near the caret */
  #chip {
    position: fixed; z-index: 30; display: flex; gap: 0.5rem; pointer-events: none;
    opacity: 0; transition: opacity 0.2s, transform 0.2s; transform: translateY(2px);
  }
  #chip.show { opacity: 1; transform: none; }
  .key {
    display: inline-flex; align-items: center; gap: 0.45ch;
    font-family: var(--mono); font-size: 11px; color: var(--mut);
    background: var(--surface); border: 1px solid var(--rule-2); border-radius: 7px;
    padding: 0.22rem 0.5rem; transition: color 0.12s, border-color 0.12s, background 0.12s;
  }
  .key kbd { font-family: var(--mono); font-size: 10px; color: var(--fg); border: 1px solid var(--rule-2); border-bottom-width: 2px; background: #0d0d12; border-radius: 4px; padding: 0.02em 0.4ch; }
  .key.fire { color: var(--green); border-color: var(--green-soft); background: var(--green-soft); }
  .key.fire kbd { color: var(--green); }

  /* controls */
  .controls {
    position: fixed; bottom: 1.1rem; left: 0; right: 0; display: flex; justify-content: center; gap: 0.6rem;
    font-family: var(--mono); font-size: 12px; z-index: 40;
  }
  .controls button {
    font: inherit; cursor: pointer; color: var(--mut);
    background: color-mix(in srgb, var(--bg) 60%, transparent);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--rule-2); border-radius: 999px; padding: 0.34rem 0.9rem;
    transition: color 0.15s, border-color 0.15s, opacity 0.3s;
  }
  .controls button:hover { color: var(--fg); border-color: var(--caret); }
  .controls button:focus-visible { outline: 2px solid var(--caret); outline-offset: 2px; }
  #replay[hidden] { display: none; }

  /* persistent corner nav, fades in at the end */
  .corner {
    position: fixed; top: 1.2rem; right: 1.4rem; z-index: 40;
    display: flex; gap: 1.1rem; font-family: var(--mono); font-size: 12.5px;
    opacity: 0; transition: opacity 0.6s ease;
  }
  .corner.show { opacity: 1; }
  .corner a { color: var(--mut); text-decoration: none; }
  .corner a:hover { color: var(--fg); }

  @media (prefers-reduced-motion: reduce) {
    #caret { animation: none; }
    .lift, .drop, .fixpop, #chip { transition: none; animation: none; }
  }
  @media (max-height: 560px) { main { padding-top: 3rem; align-items: flex-start; } }
</style>
</head>
<body>
<!--
  SPA fallback for nested research routes. In production Cloudflare has no static file
  for /research/<slug>, so it serves this index.html. We detect that prefix before the
  page paints and hand off to research.html (which CF DOES serve, at /research).
-->
<script>
  (function () {
    var m = location.pathname.match(/^\/research\/([^/?#]+)\/?$/);
    if (m) location.replace("/research?p=" + encodeURIComponent(m[1]));
  })();
</script>

<nav class="corner" id="corner" aria-hidden="true">
  <a href="/announcements">announcements</a>
  <a href="/research">research</a>
  <a href="https://github.com/frgmt0/typer">github ↗</a>
</nav>

<main>
  <div id="doc" aria-label="typr, written by typr"></div>
</main>

<div id="chip" aria-hidden="true">
  <span class="key" id="key-tab"><kbd>tab</kbd> word</span>
  <span class="key" id="key-all"><kbd>`</kbd> all</span>
</div>
<div class="fixpop" id="fixpop" aria-hidden="true"></div>

<div class="controls">
  <button id="skip">skip ›</button>
  <button id="replay" hidden>replay ↻</button>
</div>

<script type="module" src="/src/home.ts"></script>
</body>
</html>
