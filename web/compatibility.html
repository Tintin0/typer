<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>typer · app compatibility — local autocomplete for macOS</title>
<meta name="description" content="An honest, per-app compatibility matrix for typer: caret placement method, completion quality, known quirks, and status (solid / approximate / known issue) across native, Electron, terminal, and Google Docs apps on macOS." />
<meta name="keywords" content="autocomplete compatibility macos, terminal autocomplete macos, slack autocomplete, vscode autocomplete macos, google docs autocomplete" />
<meta property="og:title" content="typer · app compatibility" />
<meta property="og:description" content="Honest per-app caret compatibility for typer on macOS." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://typr.frgmt.xyz/compatibility" />
<meta name="theme-color" content="#fafaf8" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/space-grotesk-var.woff2" />
<link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/dm-sans-var.woff2" />
<script>
  (function () {
    try {
      var t = localStorage.getItem("typer-theme");
      if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  })();
</script>
</head>

<header id="nav"></header>

<main id="compatibility">
  <!-- The full per-app caret matrix is rendered by src/compatibility.ts. The
       noscript fallback below points at the source ladder for no-JS visitors. -->
  <noscript>
    <section class="section">
      <div class="container">
        <h1 style="font-size: var(--t-h2); margin-bottom: var(--sp-5);">app compatibility</h1>
        <p class="lead" style="max-width: 60ch;">
          the per-app caret matrix needs JavaScript. the underlying fallback ladder lives in
          <a href="https://github.com/frgmt0/typer/blob/main/docs/overhaul-spec.md" target="_blank" rel="noopener">docs/overhaul-spec.md</a>
          §B on GitHub.
        </p>
      </div>
    </section>
  </noscript>
</main>

<footer id="footer"></footer>

</body>
</html>
