<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>typer-writer · typr alpha 2</title>
<meta name="description" content="typer-writer: a local model you summon to rewrite and draft. Coming in Typer Alpha 2. On your Mac, on purpose." />
<meta property="og:title" content="typer-writer · typr alpha 2" />
<meta property="og:description" content="A local model you summon to rewrite and draft. Coming in Typer Alpha 2." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://typr.frgmt.xyz/v2" />
<meta name="theme-color" content="#08080b" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<style>
  :root {
    --bg: #08080b;
    --fg: #e7e7ea;
    --dim: #8a8a92;
    --faint: #55555e;
    --accent: #6ea8ff;
    --green: #5fd081;
    --rule: #1f1f25;
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", "Fira Code", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: var(--mono); font-size: 15px; line-height: 1.75;
    -webkit-font-smoothing: antialiased; overflow-x: hidden;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; text-underline-offset: 3px; }

  /* ---------- intro (pre-takeover) ---------- */
  #intro {
    position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 1.4rem; padding: 2rem; text-align: center;
    transition: opacity 0.5s ease; background: var(--bg);
  }
  #intro.gone { opacity: 0; pointer-events: none; }
  .intro-tag { color: var(--faint); }
  .intro-tag .g { color: var(--accent); }
  .intro-lines { color: var(--dim); line-height: 2; }
  .intro-lines .pr { color: var(--faint); }
  .intro-lines b { color: var(--fg); font-weight: 400; }
  .reveal {
    margin-top: 0.6rem; font-family: var(--mono); font-size: 14px; cursor: pointer;
    color: var(--bg); background: var(--accent); border: 1px solid var(--accent);
    border-radius: 8px; padding: 0.55rem 1.3rem; transition: filter 0.15s, transform 0.1s;
  }
  .reveal:hover { filter: brightness(1.12); }
  .reveal:active { transform: translateY(1px); }
  .reveal:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  .reveal .blink { animation: blink 1.05s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .intro-skip { color: var(--faint); font-size: 12px; }

  /* ---------- ascii 3D stage ---------- */
  #grid {
    position: fixed; inset: 0; z-index: 10; margin: 0; display: none;
    font-family: var(--mono); white-space: pre; overflow: hidden;
    color: var(--accent); background: var(--bg);
    letter-spacing: 0; user-select: none;
    text-shadow: 0 0 6px rgba(110,168,255,0.45);
    display: none; align-items: center; justify-content: center;
  }
  #grid.on { display: flex; }
  #grid pre { margin: 0; }

  /* skip during takeover */
  #skip {
    position: fixed; bottom: 1rem; right: 1.1rem; z-index: 30; display: none;
    font-family: var(--mono); font-size: 12px; cursor: pointer; color: var(--dim);
    background: rgba(8,8,11,0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--rule); border-radius: 999px; padding: 0.3rem 0.85rem;
  }
  #skip.on { display: block; }
  #skip:hover { color: var(--fg); border-color: var(--accent); }

  /* ---------- content (post-takeover) ---------- */
  #content {
    position: relative; z-index: 5; max-width: 76ch; margin: 0 auto;
    padding: 8vh 1.4rem 16vh; opacity: 0; transition: opacity 0.6s ease;
  }
  #content.on { opacity: 1; }
  .blk { margin: 0; }
  .brand { color: var(--dim); margin-bottom: 2rem; }
  .brand .g { color: var(--accent); }
  .brand .a2 { color: var(--faint); }
  h1.h1 { font-size: 1.7rem; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 0.4rem; }
  .sub { color: var(--faint); margin: 0 0 1.7rem; }
  p.p { color: var(--dim); margin: 0 0 1.7rem; max-width: 64ch; }
  p.p b { color: var(--fg); font-weight: 400; }
  .h2 { color: var(--accent); margin: 2.2rem 0 0.5rem; }
  pre.list { margin: 0 0 1.7rem; white-space: pre; overflow-x: auto; color: var(--dim); }
  pre.list b { color: var(--fg); font-weight: 400; }
  pre.code { margin: 0 0 1.2rem; white-space: pre-wrap; word-break: break-word; color: var(--fg); }
  pre.code .pr { color: var(--faint); }
  .foot { color: var(--faint); margin-top: 2.4rem; padding-top: 1.4rem; border-top: 1px solid var(--rule); }
  .foot a { color: var(--dim); }
  .foot a:hover { color: var(--fg); }
  .done { color: inherit; }
  .ghost { color: var(--faint); }
  #ccaret { display: inline-block; width: 2px; height: 1.05em; background: var(--accent); vertical-align: -0.16em; margin: 0 1px; animation: blink 1.05s steps(1) infinite; }
  #ccaret.hide { display: none; }
  .ckey { position: fixed; z-index: 8; display: flex; gap: 0.45rem; pointer-events: none; opacity: 0; transition: opacity 0.18s; }
  .ckey.show { opacity: 1; }
  .ckey .k { color: var(--dim); font-size: 12px; }
  .ckey .k kbd { font-family: inherit; color: var(--fg); border: 1px solid #2a2a32; border-bottom-width: 2px; border-radius: 4px; padding: 0 0.4ch; }
  .ckey .k.fire, .ckey .k.fire kbd { color: var(--green); border-color: var(--green); }

  @media (prefers-reduced-motion: reduce) {
    .reveal .blink, #ccaret { animation: none; }
    #intro, #content { transition: none; }
  }
</style>
</head>
<body>
  <main id="grid" aria-hidden="true"><pre id="gridpre"></pre></main>

  <section id="intro">
    <div class="intro-tag">typr<span class="g">_</span> <span>alpha 2</span></div>
    <div class="intro-lines">
      <div><span class="pr">&gt;</span> the quiet autocomplete shipped first.</div>
      <div><span class="pr">&gt;</span> the one you <b>call on purpose</b> is next.</div>
    </div>
    <button class="reveal" id="reveal">reveal alpha 2 <span class="blink">_</span></button>
    <div class="intro-skip">press space, or click</div>
  </section>

  <div id="content" aria-label="typer-writer"></div>

  <div class="ckey" id="ckey" aria-hidden="true">
    <span class="k" id="ckey-tab"><kbd>tab</kbd> word</span>
    <span class="k" id="ckey-all"><kbd>`</kbd> all</span>
  </div>

  <button id="skip">skip ›</button>

  <script type="module" src="/src/v2.ts"></script>
</body>
</html>
